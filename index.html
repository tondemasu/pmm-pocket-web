<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f4c81">
  <title>PMM Pocket Web</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="brand">
        <img src="assets/icon-192.png" alt="PMM" class="brand-icon">
        <div>
          <div class="brand-title">PMM Pocket Web</div>
          <div class="brand-sub">PMM JSON 連携版</div>
        </div>
      </div>
      <button id="darkToggle" class="ghost-btn" type="button">ダーク</button>
    </header>

    <main>
      <section id="startView" class="panel start-panel">
        <div class="start-brand">
          <img src="assets/icon-192.png" alt="PMM" class="start-icon">
          <h1>PMM Pocket Web</h1>
        </div>
        <p class="notice">
          PMM本体とWeb版で同じ保存ファイルを同時に編集すると 上書き事故の原因になります<br>
          PMM本体を閉じてから読み込んでください
        </p>
        <div class="start-actions">
          <label class="primary-btn file-label">
            JSON読込
            <input id="fileInput" type="file" accept="application/json,.json" hidden>
          </label>
          <button id="newDataBtn" class="secondary-btn" type="button">空データ開始</button>
        </div>
        <div class="footer-links">
          <button class="link-btn" data-dialog="help">ヘルプ</button>
          <button class="link-btn" data-dialog="about">このアプリについて</button>
        </div>
      </section>

      <section id="mainView" class="hidden">
        <div class="toolbar panel">
          <div class="file-info">
            <strong id="loadedName">未読込</strong>
            <span id="dirtyMark"></span>
          </div>
          <div class="toolbar-actions">
            <label class="secondary-btn small file-label">再読込<input id="fileInput2" type="file" accept="application/json,.json" hidden></label>
            <button id="saveBtn" class="primary-btn small" type="button">JSON書き出し</button>
          </div>
        </div>

        <nav class="tabs" role="tablist">
          <button class="tab active" data-tab="self">自メンバー</button>
          <button class="tab" data-tab="other">他メンバー</button>
          <button class="tab" data-tab="pending">新メンバー</button>
        </nav>

        <section id="tab-self" class="tab-view active">
          <div class="section-head">
            <h2>自メンバー活動管理 <span id="selfCount" class="count"></span></h2>
            <input id="selfSearch" class="search" type="search" placeholder="名前 地域 タイトル メモで検索">
          </div>
          <div id="selfList" class="card-list"></div>
        </section>

        <section id="tab-other" class="tab-view">
          <div class="section-head">
            <h2>他メンバー辞書 <span id="otherCount" class="count"></span></h2>
            <button id="otherAddBtn" class="primary-btn small" type="button">追加</button>
          </div>
          <input id="otherSearch" class="search wide" type="search" placeholder="名前 所属 地域 タイトル メモで検索">
          <div id="otherList" class="card-list"></div>
        </section>

        <section id="tab-pending" class="tab-view">
          <div class="section-head">
            <h2>新メンバー仮登録 <span id="pendingCount" class="count"></span></h2>
            <button id="pendingAddBtn" class="primary-btn small" type="button">追加</button>
          </div>
          <input id="pendingSearch" class="search wide" type="search" placeholder="名前 紹介者 地域 メモで検索">
          <div id="pendingList" class="card-list"></div>
        </section>
      </section>
    </main>
  </div>

  <dialog id="editDialog" class="edit-dialog">
    <form method="dialog" id="editForm">
      <div class="dialog-head">
        <h3 id="editTitle">編集</h3>
        <button type="button" class="ghost-btn" id="closeEditBtn">閉じる</button>
      </div>
      <div id="editBody"></div>
      <div class="dialog-actions">
        <button type="button" id="deleteBtn" class="danger-btn hidden">削除</button>
        <button type="button" id="editSaveBtn" class="primary-btn">保存</button>
      </div>
    </form>
  </dialog>

  <dialog id="photoDialog" class="photo-dialog">
    <div class="dialog-head">
      <h3>写真登録</h3>
      <button type="button" class="ghost-btn" id="closePhotoBtn">閉じる</button>
    </div>
    <div class="photo-tools">
      <label class="secondary-btn small file-label">写真選択<input id="photoFileInput" type="file" accept="image/*" hidden></label>
      <label class="secondary-btn small file-label">撮影<input id="photoCameraInput" type="file" accept="image/*" capture="environment" hidden></label>
      <button id="rotatePhotoBtn" class="secondary-btn small" type="button">90度回転</button>
      <button id="clearPhotoBtn" class="danger-btn small" type="button">写真削除</button>
    </div>
    <div class="crop-wrap">
      <canvas id="cropCanvas" width="320" height="320"></canvas>
      <div class="crop-frame"></div>
    </div>
    <label class="range-label">拡大率 <input id="zoomRange" type="range" min="0.5" max="6" step="0.01" value="1"></label>
    <div class="dialog-actions">
      <button id="applyPhotoBtn" class="primary-btn" type="button">登録</button>
    </div>
  </dialog>

  <dialog id="previewDialog" class="preview-dialog">
    <button type="button" class="ghost-btn preview-close" id="closePreviewBtn">閉じる</button>
    <img id="previewImage" alt="顔写真プレビュー">
  </dialog>

  <dialog id="infoDialog" class="info-dialog">
    <div class="dialog-head">
      <h3 id="infoTitle">情報</h3>
      <button type="button" class="ghost-btn" id="closeInfoBtn">閉じる</button>
    </div>
    <div id="infoBody" class="info-body"></div>
  </dialog>

  <div id="toast" class="toast"></div>
  <script src="app.js"></script>
</body>
</html>
